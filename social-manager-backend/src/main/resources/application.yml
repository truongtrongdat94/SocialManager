spring:
  application:
    name: social-manager-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/social_manager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-64-characters-long-for-local-development-only}
    expiration: ${JWT_EXPIRATION:86400000}
  aes-secret: ${AES_SECRET:dev-aes-key-32-bytes-1234567890}
  gemini:
    api-key: "AIzaSyAGwJmOn-CqIHECTM8gwi4XVA5Ek_HYrCM"
    url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent"  
  leonardo:
    api-key: "a58e94d9-a355-44e8-becd-545a1bc82042"
    url: "https://cloud.leonardo.ai/api/rest/v1/generations"   
  cloudinary:
    cloud-name: "dogiiqqpy"
    api-key: "357955796644895"
    api-secret: "ltxZ1U5c5ssRtuktWXzoDhpnLWw"
  meta:
    app-id: ${META_APP_ID:}
    app-secret: ${META_APP_SECRET:}
    redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/auth/callback/meta}
  tiktok:
    client-key: ${TIKTOK_CLIENT_KEY:}
    client-secret: ${TIKTOK_CLIENT_SECRET:}
    redirect-uri: ${TIKTOK_REDIRECT_URI:http://localhost:8080/api/auth/callback/tiktok}

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
