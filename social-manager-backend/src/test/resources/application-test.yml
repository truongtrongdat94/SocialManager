spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  quartz:
    job-store-type: memory
    jdbc:
      initialize-schema: never

app:
  jwt:
    secret: test-secret-key-at-least-64-characters-long-for-testing-purposes-only
    expiration: 86400000
  aes-secret: test-aes-key-12345678901234
  gemini:
    api-key: test
  leonardo:
    api-key: test
  cloudinary:
    cloud-name: test
    api-key: test
    api-secret: test
  meta:
    app-id: test
    app-secret: test
    redirect-uri: http://localhost/test
  tiktok:
    client-key: test
    client-secret: test
    redirect-uri: http://localhost/test
