spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  autoconfigure:
    exclude:
      - org.springframework.boot.quartz.autoconfigure.QuartzAutoConfiguration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  quartz:
    job-store-type: memory
    jdbc:
      initialize-schema: never

app:
  jwt:
    secret: test-secret-key-at-least-64-characters-long-for-testing-purposes-only
    expiration: 86400000
  aes-secret: 12345678901234567890123456789012
  gemini:
    api-key: test
  leonardo:
    api-key: test
  cloudinary:
    cloud-name: test
    api-key: test
    api-secret: test
  meta:
    app-id: test
    app-secret: test
    redirect-uri: http://localhost/test
  tiktok:
    client-key: test
    client-secret: test
    redirect-uri: http://localhost/test

